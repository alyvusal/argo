apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  labels:
    app.kubernetes.io/name: argocd-image-updater-config
    app.kubernetes.io/part-of: argocd-image-updater
data:
  # applications_api: argocd  # default kubernetes
  # # The address of Argo CD API endpoint - defaults to argocd-server.argocd
  # argocd.server_addr: argocd-192.168.0.100.nip.io  # argocd-server.argocd.svc.cluster.local
  # # Whether to use GRPC-web protocol instead of GRPC over HTTP/2
  # argocd.grpc_web: "true"
  # # Whether to ignore invalid TLS cert from Argo CD API endpoint
  # argocd.insecure: "true"
  # # Whether to use plain text connection (http) instead of TLS (https)
  # argocd.plaintext: "false"
  # # Log.level can be one of trace, debug, info, warn or error
  # log.level: debug
  # private registry authentication
  # https://argocd-image-updater.readthedocs.io/en/stable/configuration/registries/
  registries.conf: |
    registries:
    - name: Docker Hub
      prefix: docker.io
      api_url: https://registry-1.docker.io
      # credentials: pullsecret:argocd/docker-registry-creds  # this not worked
      credentials: secret:argocd/dockerhub-credentials#creds
      defaultns: library
      default: true
