# https://argoproj.github.io/argo-cd/operator-manual/rbac/#rbac-resources-and-actions
# The global RBAC config map
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
data:
  policy.default: role:readonly
  scopes: '[groups, email]'
  policy.csv: |
    # if argocd-image-updater applications_api is argocd, then enable below lines
    # p, role:image-updater, applications, get, */*, allow
    # p, role:image-updater, applications, update, */*, allow
    # g, image-updater, role:image-updater
    # Policy: Allows to assign permissions to an entity.
    # Syntax: p, <role/user/group>, <resource>, <action>, <object>, <effect>
    p, role:org-admin, applications, *, */*, allow
    p, role:org-admin, logs, get, org-admin/*, allow
    p, role:org-admin, clusters, get, *, allow
    p, role:org-admin, repositories, get, *, allow
    p, role:org-admin, repositories, create, *, allow
    p, role:org-admin, repositories, update, *, allow
    p, role:org-admin, repositories, delete, *, allow
    # Group: Allows to assign authenticated users/groups to internal roles.
    # Syntax: g, <user/group>, <role>
    g, vusal, role:org-admin
    # policy.tester-overlay.csv: |
    #   p, role:tester, applications, *, */*, allow
    #   p, role:tester, projects, *, *, allow
    #   g, my-org:team-qa, role:tester
