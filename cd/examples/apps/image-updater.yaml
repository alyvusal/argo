# Image Updater
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-image-updater
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/image-list: myimage=alyvusal/demo-app  # or alyvusal/demo-app
    argocd-image-updater.argoproj.io/myimage.allow-tags: regexp:^[0-9a-f]{7}$
    argocd-image-updater.argoproj.io/myimage.ignore-tags: latest, dev
    argocd-image-updater.argoproj.io/myimage.update-strategy: newest-build
    argocd-image-updater.argoproj.io/myimage.kustomize.image-name: alyvusal/demo-app
    argocd-image-updater.argoproj.io/myimage.force-update: "true"
    # write-back-methods https://argocd-image-updater.readthedocs.io/en/stable/basics/update-methods/
    # 1. argocd method (updates app manifest in k8s live)
    # argocd-image-updater.argoproj.io/write-back-method: argocd
    # 2. git method (necessary for app-of-apps pattern)
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/github-token-secret
    argocd-image-updater.argoproj.io/write-back-target: "kustomization:../../../image-updater/examples/demo-app"
    # notifications.argoproj.io/subscribe.on-deployed.webhook: "monitoring"
    # notifications.argoproj.io/subscribe.on-sync-succeeded.webhook: "monitoring"
spec:
  destination:
    name: ''
    namespace: 'default'
    server: https://kubernetes.default.svc
  source:
    path: argo/image-updater/examples/demo-app  # change from v1 ... v3 to test
    repoURL: https://github.com/alyvusal/sre.git
    targetRevision: HEAD
  sources: []
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
