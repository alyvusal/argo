# https://argo-cd.readthedocs.io/en/stable/operator-manual/project-specification/
# https://argo-cd.readthedocs.io/en/stable/user-guide/projects/
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: development
  namespace: argocd
  labels:
    kubernetes-cluster: kind-dev
  annotations:
    argocd-autopilot.argoproj-labs.io/default-dest-server: https://kubernetes.default.svc
    argocd.argoproj.io/sync-options: PruneLast=true
    argocd.argoproj.io/sync-wave: "-2"
  # Finalizer that ensures that project is not deleted until it is not referenced by any application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Development Project
  # Allow Argofc APplication to be created in different namespaces
  # https://argo-cd.readthedocs.io/en/latest/operator-manual/app-any-namespace/
  # sourceNamespaces:
  # - default
  # Allow manifests to deploy from any Git repos
  sourceRepos:
  - 'https://github.com/argoproj/*'
  # Only permit applications to deploy to the guestbook namespace in the same cluster
  destinations:
  - namespace: default
    name: in-cluster
    server: https://kubernetes.default.svc
  # - namespace: default
  #   name: kind-dev
  #   server: https://192.168.0.100:6444
  clusterResourceBlacklist:
  - group: 'rbac.authorization.k8s.io'
    kind: ClusterRole
  - group: 'rbac.authorization.k8s.io'
    kind: ClusterRoleBinding
  # Deny all cluster-scoped resources from being created, except for Namespace
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  # Allow all namespaced-scoped resources to be created, except for ResourceQuota, LimitRange, NetworkPolicy
  namespaceResourceBlacklist:
  - group: ''
    kind: ResourceQuota
  - group: ''
    kind: LimitRange
  - group: ''
    kind: NetworkPolicy
  # Deny all namespaced-scoped resources from being created, except for Deployment and StatefulSet
  namespaceResourceWhitelist:
  - group: 'apps'
    kind: Deployment
  - group: ''
    kind: Service
  roles:
  # https://argo-cd.readthedocs.io/en/stable/user-guide/projects/#project-roles
  - name: operator
    description: Write privileges to development
    policies:
    - p, proj:development:operator, repositories, get, development/*, allow
    - p, proj:development:operator, repositories, create, development/*, allow
    - p, proj:development:operator, repositories, update, development/*, allow
    - p, proj:development:operator, repositories, delete, development/*, allow
    - p, proj:development:operator, repositories, sync, development/*, allow
    - p, proj:development:operator, repositories, override, development/*, deny
    # - p, proj:argocd:read-sync, applications, get, argocd/*, allow
    # - p, proj:argocd:read-sync, applications, sync, argocd/*, allow
    # groups:
    # - my-oidc-group
    # # NOTE: JWT tokens can only be generated by the API server and the token is not persisted
    # # anywhere by Argo CD. It can be prematurely revoked by removing the entry from this list.
    # jwtTokens:
    # - iat: 1535390316
  # Enables namespace orphaned resource monitoring.
  # signatureKeys:
  # - keyID: 896EE3F6617BEB03
  orphanedResources:
    warn: true
  syncWindows:
  - applications:
    - development/guestbook
    clusters:
    - kind-prod
    duration: 1h
    kind: allow
    manualSync: true
    namespaces:
    - default
    schedule: '* * * * *' # 10 2 2-4 *,4-5 1-3 # min, hour, day-of-month, months, day-of-week: every for all -> '* * * * *'
    timeZone: Asia/Baku
