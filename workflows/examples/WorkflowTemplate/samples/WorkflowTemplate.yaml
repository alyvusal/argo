# https://argoproj.github.io/argo-workflows/workflow-templates/
# https://argoproj.github.io/argo-workflows/workflow-templates/#working-with-parameters
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: hello-world-template-global-arg
spec:
  serviceAccountName: default
  templates:
    - name: hello-world
      container:
        image: docker/whalesay
        command: [cowsay]
        args: ["{{workflow.parameters.global-parameter}}"]
---
# Referencing template under steps
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  # generateName: hello-world-wf-global-arg-
  name: hello-world-wf-global-arg
spec:
  serviceAccountName: default
  entrypoint: whalesay
  arguments:
    parameters:
      - name: global-parameter
        value: hello
  templates:
    # You should never reference another template directly on a template object (outside of a steps or dag template)
    - name: whalesay
      steps:
        - - name: hello-world
            templateRef:
              name: hello-world-template-global-arg
              template: hello-world
---
# Referencing template under DAG
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  # generateName: workflow-template-hello-world-
  name: workflow-template-hello-world
spec:
  entrypoint: whalesay
  templates:
  - name: whalesay
    dag:
      tasks:
        - name: call-whalesay-template
          templateRef:
            name: workflow-template-1
            template: whalesay-template
          arguments:
            parameters:
            - name: message
              value: "hello world"
---
# Create Workflow from WorkflowTemplate Spec
# https://argoproj.github.io/argo-workflows/workflow-templates/#referencing-other-workflowtemplates
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  # generateName: workflow-template-hello-world-
  name: workflow-template-hello-world
spec:
  entrypoint: whalesay-template
  arguments:
    parameters:
      - name: message
        value: "from workflow"
  workflowTemplateRef:
    name: workflow-template-submittable
