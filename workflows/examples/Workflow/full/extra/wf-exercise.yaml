---
# Execution flow: A(Task1) > B(Task2) > C(Task3, Workflow 2) > B(Task4) > B(Task5) > D(Task6) > A(Task7)
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: dag-exercise
  namespace: argo
spec:
  entrypoint: dag-template
  templates:
  - name: dag-template
    dag:
      tasks:
      - name: Task1
        template: taskA-template
      - name: Task2
        template: taskB-template
        dependencies: [Task1]
      - name: Task3
        template: taskC-template
        dependencies: [Task1]
      - name: Task4
        template: taskB-template
        dependencies: [Task2]
      - name: Task5
        template: taskB-template
        dependencies: [Task4]
      - name: Task6
        template: delayD-template
        dependencies: [Task3, Task5]
      - name: Task7
        template: taskA-template
        dependencies: [Task6]

  - name: taskA-template
    script:
      image: python:3.8-slim
      command: [python]
      source: |
        print("Task A executed successfully with script template.")

  - name: taskB-template
    container:
      image: python:3.8-slim
      command: [echo, "Task B executed successfully with container template."]

  - name: taskC-template
    resource:
      action: create
      manifest: |
        apiVersion: argoproj.io/v1alpha1
        kind: Workflow
        metadata:
          name: wf-resource-template
          namespace: argo
        spec:
          entrypoint: resource-template
          templates:
          - name: resource-template
            script:
              image: python:3.8-slim
              command: [python]
              source: |
                print("Task C executed successfully with resource template.")

  - name: delayD-template
    suspend:
      duration: "5s"