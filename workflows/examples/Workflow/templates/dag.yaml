# DAG
# A DAG template is a common type of orchestration template
# https://argo-workflows.readthedocs.io/en/latest/walk-through/dag/
---
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  # generateName: dag-template-
  name: dag-template-1
  namespace: argo
spec:
  entrypoint: diamond
  templates:
  - name: echo
    inputs:
      parameters:
      - name: message
    container:
      image: alpine:3.7
      command: [echo, "{{inputs.parameters.message}}"]
  - name: diamond
    dag:
      tasks:
      - name: A
        template: echo
        arguments:
          parameters: [{name: message, value: A}]
      - name: B
        dependencies: [A]
        template: echo
        arguments:
          parameters: [{name: message, value: B}]
      - name: C
        dependencies: [A]
        template: echo
        arguments:
          parameters: [{name: message, value: C}]
      - name: D
        dependencies: [B, C]
        template: echo
        arguments:
          parameters: [{name: message, value: D}]
---
# Execution flow: A(Task1) > B(Task2) > C(Task3, Workflow 2) > B(Task4) > B(Task5) > D(Task6) > A(Task7)
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: dag-exercise
  namespace: argo
spec:
  entrypoint: dag-template
  templates:
  - name: dag-template
    dag:
      tasks:
      - name: task1
        template: taska-template
      - name: task2
        template: taskb-template
        dependencies: [task1]
      - name: task3
        template: taskc-template
        dependencies: [task1]
      - name: task4
        template: taskb-template
        dependencies: [task2]
      - name: task5
        template: taskb-template
        dependencies: [task4]
      - name: task6
        template: delayd-template
        dependencies: [task3, task5]
      - name: task7
        template: taska-template
        dependencies: [task6]

  - name: taska-template
    script:
      image: python:3.8-slim
      command: [python]
      source: |
        print("Task A executed successfully with script template.")

  - name: taskb-template
    container:
      image: python:3.8-slim
      command: [echo, "Task B executed successfully with container template."]

  - name: taskc-template
    resource:
      action: create
      manifest: |
        apiVersion: argoproj.io/v1alpha1
        kind: Workflow
        metadata:
          name: wf-resource-template
          namespace: argo
        spec:
          entrypoint: resource-template
          templates:
          - name: resource-template
            script:
              image: python:3.8-slim
              command: [python]
              source: |
                print("Task C executed successfully with resource template.")

  - name: delayd-template
    suspend:
      duration: "5s"
---
