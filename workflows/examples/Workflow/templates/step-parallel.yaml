apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: steps-parallel-templates
  namespace: argo
spec:
  entrypoint: steps-template-parallel
  templates:
  - name: steps-template-parallel
    steps:
    - - name: step1 # step1 > (step2 + step3) > step4 is serial
        template: task-template
    - - name: step2  # step2 and step3 is parallel
        template: task-template
      - name: step3
        template: task-template
    - - name: step4
        template: task-template

  - name: task-template
    script:
      image: python:3.8-slim
      command: [python]
      source: |
        print("Task executed.")