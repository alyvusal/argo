# A steps template allows you to run a series of steps in sequence.
# https://argo-workflows.readthedocs.io/en/latest/walk-through/steps/
---
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: steps-serial-template
  namespace: argo
spec:
  entrypoint: steps-template-serial
  templates:
  - name: steps-template-serial
    steps:
    - - name: step1
        template: task-template
    - - name: step2
        template: task-template
    - - name: step3
        template: task-template

  - name: task-template
    script:
      image: python:3.8-slim
      command: [python]
      source: |
        print("Task executed.")