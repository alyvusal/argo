# A resource template allows you to create a Kubernetes resource and wait for it to meet a condition (e.g. successful).
# This is useful if you want to interoperate with another Kubernetes system, like AWS Spark EMR.
---
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  # generateName: resource-template-  # Name of this Workflow
  name: resource-template
  namespace: argo
spec:
  entrypoint: resource-template  # "main" template
  templates:
  - name: resource-template
    resource:
      action: create
      manifest: |
        apiVersion: argoproj.io/v1alpha1
        kind: Workflow
        metadata:
          name: wf-generated-with-resource-template
          namespace: argo
        spec:
          entrypoint: test-template
          templates:
          - name: test-template
            script:
              image: python:3.8-slim
              command: [python]
              source: |
                print("Workflow wf-generated-with-resource-template created with resource template.")
