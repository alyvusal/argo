apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base/rollout

# replicas:  # not supported by argo rollouts
# - count: 2
#   name: demo-app

namespace: default
commonAnnotations:
  supported-by: sre@example.com

labels:
- includeSelectors: false
  pairs:
    project: demo-app

patches:
- path: service.yaml
- path: service-preview.yaml

images:
- name: alyvusal/demo-app
  newTag: v1