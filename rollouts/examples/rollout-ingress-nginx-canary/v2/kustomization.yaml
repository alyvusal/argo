apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base/rollout
- ingress.yaml

# replicas:  # not supported by argo rollouts
# - count: 2
#   name: demo-app

namespace: default
commonAnnotations:
  supported-by: sre@example.com

patches:
- path: rollout.yaml

labels:
- includeSelectors: false
  pairs:
    project: demo-app

images:
- name: alyvusal/demo-app
  newTag: v2