apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  labels:
    app: demo-app
    tier: front
  name: demo-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: demo-app
  strategy:
    blueGreen: null
    # https://argoproj.github.io/argo-rollouts/features/canary/
    canary:
      steps:
      - setWeight: 20
      - pause:
          duration: 10s
      - setWeight: 40
      - pause:
          duration: 10s
      - setWeight: 60
      - pause:
          duration: 10s
      - setWeight: 80
      - pause:
          duration: 10s
      - setWeight: 100
  template:
    metadata:
      # Remove spec.template.metadata.name if present.
      labels:
        app: demo-app
        tier: front
    spec:
      containers:
      - image: alyvusal/demo-app:v1
        name: demo-app
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"

