apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base/rollout
- ../base
- ../analysis-templates

patches:
- path: rollout.yaml  # this is symlink to ../patches/rollout.yaml

# replicas:  # not supported by argo rollouts
# - count: 2
#   name: demo-app

namespace: default
commonAnnotations:
  supported-by: sre@example.com

labels:
- includeSelectors: false
  pairs:
    project: demo-app

images:
- name: alyvusal/demo-app
  newTag: v3
